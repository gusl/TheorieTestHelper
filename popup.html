<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheorieTestHelper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      min-height: 160px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #ffffff;
    }

    header {
      background: #3b82f6;
      color: #fff;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
    }

    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 500;
      color: #374151;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #3b82f6;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #3b82f6; }
    input:checked + .slider:before { transform: translateX(18px); }

    button#save {
      width: 100%;
      padding: 8px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button#save:hover { background: #2563eb; }

    #status {
      font-size: 12px;
      color: #16a34a;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <header>TheorieTestHelper</header>
  <div class="content">

    <div class="row toggle-row">
      <label for="enabled-toggle">Enable translation</label>
      <label class="switch">
        <input type="checkbox" id="enabled-toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <label for="api-key">OpenAI API Key</label>
      <input type="password" id="api-key" placeholder="sk-…" autocomplete="off" />
    </div>

    <button id="save">Save</button>
    <div id="status"></div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
