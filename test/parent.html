<!DOCTYPE html>
<html>
<head><title>TTH Test Harness</title></head>
<body style="margin:0;background:#f0f4f8;">
  <div style="padding:10px;background:#1e3a5f;color:#fff;font-family:sans-serif;">
    <strong>TTH Test Harness</strong>
    <button onclick="load('mc')">Multiple Choice</button>
    <button onclick="load('numeric')">Numeric</button>
    <button onclick="load('transition')">MC → Numeric transition</button>
    <button onclick="load('grouped-mc')">Grouped MC</button>
    <button onclick="load('video')">Video question</button>
  </div>
  <div style="padding:10px 14px;font-family:sans-serif;font-size:13px;background:#fff8e1;border-bottom:1px solid #f0c040;">
    <strong>Button order:</strong> Any order is fine — each button independently reloads the iframe from scratch.
    Exception: after pressing <em>MC → Numeric transition</em>, wait ~2 s; after pressing <em>Video question</em>, wait ~4 s for the real question to appear.
  </div>
  <iframe id="qf" src="question.html?type=mc"
          style="width:100%;height:600px;border:none;display:block;"></iframe>
  <script>
    function load(type) { document.getElementById('qf').src = 'question.html?type=' + type; }
  </script>
</body>
</html>
